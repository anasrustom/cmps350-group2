<!DOCTYPE html>
<html>

<head>
  <title>QatarConnect | Register</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/favicon.ico">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-logo">
        <a href="index.html"><img src="images/QatarConnect-Logo.png" alt="QatarConnect"></a>
      </div>

      <header>
        <h1>register</h1>
        <p class="auth-subtitle">create your account to get started</p>
      </header>

      <div class="alert alert-error hidden" id="register-message"></div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="register-username">username</label>
          <input class="form-input" type="text" id="register-username" name="username" placeholder="choose a username"
            required autofocus>
          <div class="form-error hidden" id="register-username-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="register-email">email</label>
          <input class="form-input" type="email" id="register-email" name="email" placeholder="you@example.com"
            required>
          <div class="form-error hidden" id="register-email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="register-password">password</label>
          <input class="form-input" type="password" id="register-password" name="password"
            placeholder="create a password" required>
          <div class="form-error hidden" id="register-password-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="register-confirm-password">confirm password</label>
          <input class="form-input" type="password" id="register-confirm-password" name="confirm-password"
            placeholder="enter your password again" required>
          <div class="form-error hidden" id="register-confirm-password-error"></div>
        </div>

        <button class="btn btn-primary btn-full" type="submit" id="register-submit">register</button>
      </form>

      <p class="auth-link">
        already have an account?
        <a href="login.html">log in here</a>
      </p>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
